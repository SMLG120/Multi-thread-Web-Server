<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 — Not Found</title>
  <style>
    body {
      background: #0d1117; color: #c9d1d9;
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; margin: 0; text-align: center;
    }
    h1 { font-size: 8rem; margin: 0; color: #f85149; line-height: 1; }
    h2 { font-size: 1.5rem; color: #8b949e; margin: 1rem 0; }
    p  { color: #8b949e; max-width: 400px; }
    a  { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>File Not Found</h2>
  <p>The file you requested does not exist on this server.</p>
  <p style="margin-top:2rem"><a href="/">← Return to Home</a></p>
</body>
</html>
